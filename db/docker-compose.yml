services:
  postgres:
    image: postgres:18-alpine
    container_name: dvibd-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dvibd}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dvibd_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-dvibd}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - dvibd-postgres-data:/var/lib/postgresql/data
      # Any .sql or .sh files placed here run once, on first initialization.
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-dvibd} -d ${POSTGRES_DB:-dvibd}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - dvibd-net

  # ---------------------------------------------------------------------------
  # Database management (pgAdmin) — commented out for now.
  # Uncomment to run a web-based admin UI at http://localhost:${PGADMIN_PORT:-5050}
  # ---------------------------------------------------------------------------
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: dvibd-pgadmin
  #   restart: unless-stopped
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@dvibd.local}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
  #     PGADMIN_CONFIG_SERVER_MODE: "False"
  #   ports:
  #     - "${PGADMIN_PORT:-5050}:80"
  #   volumes:
  #     - dvibd-pgadmin-data:/var/lib/pgadmin
  #   networks:
  #     - dvibd-net

volumes:
  dvibd-postgres-data:
    name: dvibd-postgres-data
  # dvibd-pgadmin-data:
  #   name: dvibd-pgadmin-data

networks:
  dvibd-net:
    name: dvibd-net
    driver: bridge
