<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Solid App</title>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("dvibd-theme");
          var theme =
            stored ||
            (window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light");
          document.documentElement.setAttribute("data-theme", theme);
        } catch (e) {}
      })();
    </script>
    <script type="module" crossorigin src="/assets/index-tOmDN1DD.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/index-DwZNuZdP.css">

  </body>
</html>
